<div class="project-card" style="background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.2); width: 100%;">
    <div class="editor-header">
        <div class="window-controls">
            <span class="control-btn close"></span>
            <span class="control-btn minimize"></span>
            <span class="control-btn expand"></span>
        </div>
        <div class="editor-title font-mono" style="font-size: 0.8rem;">{{ title }}</div>
    </div>
    <div class="editor-body" style="padding: 0;">
        <div class="code-area font-mono" style="padding: 16px 20px 16px 55px; line-height: 1.5; font-size: 0.95rem;">
